name: CI/CD Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # будет выглядеть как ghcr.io/username/repo

jobs:
  # ========== JOB 1: СБОРКА И ПУБЛИКАЦИЯ ОБРАЗА ==========
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # необходимо для push в GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========== JOB 2: ДЕПЛОЙ НА СЕРВЕР ЧЕРЕЗ SSH ==========
  deploy:
    runs-on: ubuntu-latest
    needs: build                # деплой запускается только после успешной сборки
    if: github.ref == 'refs/heads/main'   # деплоим только с main

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            # Остановить и удалить старый контейнер, если существует
            docker stop fastapi-app || true
            docker rm fastapi-app || true

            # Логинимся в GHCR (используем GitHub токен)
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Скачиваем последний образ (тег latest)
            IMAGE_FULL=${{ env.REGISTRY }}/${{ github.repository }}:latest
            docker pull $IMAGE_FULL

            # Запускаем новый контейнер
            docker run -d --name fastapi-app -p 8000:8000 --restart unless-stopped $IMAGE_FULL

            # Очистка неиспользуемых образов
            docker image prune -f